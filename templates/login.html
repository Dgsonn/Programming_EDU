<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Programming EDU</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body class="auth-body">

<div class="auth-card">

  <div class="auth-logo">
    <span class="blue">Pro</span><span class="blue">gram</span><span class="red">ming</span>
    <span class="blue"> E</span><span class="blue">D</span><span class="red">U</span>
  </div>

  <div class="auth-title">Chào mừng trở lại 👋</div>
  <div class="auth-sub">Đăng nhập để tiếp tục hành trình lập trình</div>

  <div class="auth-error" id="error-msg"></div>

  <div class="auth-field">
    <label class="auth-label">Email</label>
    <input id="inp-email" class="auth-input" type="email" placeholder="caovannhan@email.com" />
  </div>

  <div class="auth-field">
    <label class="auth-label">Mật khẩu</label>
    <input id="inp-password" class="auth-input" type="password" placeholder="••••••••" />
  </div>

  <button class="auth-btn" id="login-btn" onclick="doLogin()">Đăng nhập →</button>

  <div class="auth-divider">
    Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
  </div>
  <div class="auth-divider" style="margin-top:10px">
    <a href="/">← Về trang chủ</a>
  </div>

</div>

<script>
  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function doLogin() {
    var btn      = document.getElementById('login-btn');
    var email    = document.getElementById('inp-email').value.trim();
    var password = document.getElementById('inp-password').value;
    if (!email || !password) { showError('Vui lòng nhập đầy đủ thông tin.'); return; }
    btn.disabled = true;
    btn.textContent = 'Đang đăng nhập...';
    fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
      .then(function(res) {
        if (res.ok) { window.location = '/dashboard'; }
        else {
          showError(res.d.error || 'Đăng nhập thất bại.');
          btn.disabled = false;
          btn.textContent = 'Đăng nhập →';
        }
      })
      .catch(function() {
        showError('Không kết nối được server.');
        btn.disabled = false;
        btn.textContent = 'Đăng nhập →';
      });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
